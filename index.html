<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #FFFFFF; 
        }
        
        .wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            position: relative;
            background-color: #FFFFFF; 
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* DATOR-INSTÄLLNINGAR FÖR BEHÅLLAREN: 
           Denna klipper bort de nedersta 40 pixlarna så menyraden försvinner */
        .excel-container {
            width: 100%;
            max-width: 1650px; /* Din nya bredd med de 10 extra kolumnerna */
            height: 1910px;    /* Sänkt med 40px för att dölja bottenraden */
            overflow: hidden !important; 
            position: relative;
        }
        
        /* iFramen görs lite högre än sin behållare så att bottenraden hamnar "utanför bild" */
        iframe { 
            width: 100%; 
            height: 1950px;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #FFFFFF;
            margin-bottom: -40px !important; /* Trycker ner bottenraden under kanten */
        }
        
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
        }

        /* MOBIL-JUSTERING */
        @media (max-width: 768px) {
            .wrapper {
                height: 100vh;
                padding: 0;
                align-items: center;
                overflow: hidden;
            }
            .excel-container {
                max-width: 100%;
                height: 100%;
            }
            iframe {
                height: 100%; 
                overflow: auto !important; 
                margin-bottom: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <iframe 
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        
        shield.addEventListener('wheel', function(e) {
            window.scrollBy({
                top: e.deltaY,
                left: e.deltaX,
                behavior: 'auto'
            });
        }, { passive: true });

        let moved = false;
        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                shield.style.pointerEvents = 'none';
                const clickEvent = new MouseEvent('click', {
                    clientX: e.changedTouches[0].clientX,
                    clientY: e.changedTouches[0].clientY,
                    bubbles: true
                });
                document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY).dispatchEvent(clickEvent);
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 50);
        }, { passive: false });
    </script>

</body>
</html>
