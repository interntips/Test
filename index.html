<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-vm 2026 - Interntips</title>
    <style>
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            width: 100% !important; 
            height: 100% !important; 
            overflow: auto !important; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040 !important;
        }
        
        /* Centrerar paketet på datorskärmar */
        .wrapper {
            display: flex !important;
            justify-content: center !important;
            align-items: flex-start !important;
            width: 100% !important;
            min-height: 100vh !important;
            background-color: #404040 !important;
        }

        /* Behållaren runt iFramen */
        .excel-container {
            position: relative !important;
            box-sizing: border-box !important;
            background-color: #404040 !important;
        }

        iframe { 
            border: none !important;        
            box-shadow: none !important;    
            outline: none !important;       
            display: block !important;
            background-color: #404040 !important; 
        }

        /* ------------------------------------------
           DATOR-INSTÄLLNINGAR (Skärmar över 768px)
           ------------------------------------------ */
        @media (min-width: 769px) {
            .excel-container {
                width: 1200px !important;      /* Rejäl bredd så du ser hela vägen till höger */
                height: 1620px !important;     /* Höjden som klipper bort det vita i botten */
                margin-top: 30px !important;
                margin-bottom: 30px !important;
                overflow: hidden !important;   /* Klipper bort Excels dolda vita celler */
            }
            
            /* Tvingar iFramen att bli större än containern för att dölja Excels vita marginaler */
            html body .wrapper .excel-container iframe {
                width: 1260px !important;      /* Trycker ut vita tomma celler/scrollister till höger */
                height: 1720px !important;     /* Trycker ner vita tomma celler/scrollister i botten */
                margin-left: -5px !important;  /* Finjustering i sidled */
            }
        }

        /* ------------------------------------------
           MOBIL-INSTÄLLNINGAR (Lämnas som det var)
           ------------------------------------------ */
        @media (max-width: 768px) {
            .excel-container {
                width: 100% !important;
                height: 100vh !important;
            }
            iframe {
                width: 100% !important;
                height: 100% !important;
            }
        }
        
        /* Skölden för touch-skärmar (Orörd) */
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="touch-shield" id="shield"></div>

            <iframe 
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
                frameborder="0" 
                scrolling="no"
                style="border:0 !important; box-shadow:none !important;">
            </iframe>
        </div>
    </div>

    <script>
        // Hela ditt fungerande touch-skript lämnas exakt som det var
        const shield = document.getElementById('shield');
        let moved = false;

        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                e.preventDefault();
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 10);
        }, { passive: false });

        shield.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);
    </script>

</body>
</html>
