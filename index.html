<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-VM 2026 - Interntips</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040;
        }
        .wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            position: relative;
            background-color: #404040;
        }
        iframe { 
    width: 100%; 
    max-width: 1400px;
    height: 100%; 
    border: none;
    display: block;
    clip-path: inset(0px 0px 40px 0px);
}
        
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            max-width: 1400px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="touch-shield" id="shield"></div>
        <iframe 
            id="excel-iframe"
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!B3%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>
    <script>
        const shield = document.getElementById('shield');

        if ('ontouchstart' in window) {
            shield.style.display = 'block';
        } else {
            shield.style.display = 'none';
        }

        let moved = false;
        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });
        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });
        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                e.preventDefault();
            }
            shield.style.pointerEvents = 'auto';
        }, { passive: false });
        shield.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);
    </script>
</body>
</html>
