<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.09, user-scalable=yes">
    <title>Fotbolls-VM 2026 - Interntips</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #404040;
        }
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            background-color: #404040;
        }
        .iframe-scaler {
            width: 1600px;
            height: 2366px;
            transform-origin: top center;
            position: relative;
            flex-shrink: 0;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            clip-path: inset(4px 39px 120px 3px);
        }
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            display: none;
        }
        .loader-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: #00b0f0;
            z-index: 100;
            transition: opacity 0.3s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border-left-color: #00b0f0;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Overlay bakgrund */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Flytande ruta */
        .info-box {
            background-color: #404040;
            border: 1px solid #00b0f0;
            color: #ffc000;
            font-family: sans-serif;
            font-size: 16px;
            line-height: 1.6;
            padding: 24px 28px;
            max-width: 340px;
            width: 90%;
            border-radius: 4px;
            text-align: center;
            position: relative;
            z-index: 201;
        }
    </style>
</head>
<body>
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <div>Hämtar statistik...</div>
    </div>

    <!-- Flytande informationsruta -->
    <div class="overlay" id="overlay">
        <div class="info-box" id="infoBox">
            Leta upp din tipsrad. Om den avviker från din inlämnade rad skicka ett sms till 0701749123
        </div>
    </div>

    <div class="wrapper" id="wrapper">
        <div class="iframe-scaler" id="scaler">
            <div class="touch-shield" id="shield"></div>
            <iframe
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!B3%3ACA120&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>
    <script>
        const IFRAME_W = 1600;
        const IFRAME_H = 2366;
        const DESKTOP_BREAKPOINT = 1280;
        const scaler  = document.getElementById('scaler');
        const wrapper = document.getElementById('wrapper');
        const shield  = document.getElementById('shield');
        const iframe  = document.getElementById('excel-iframe');
        const loader  = document.getElementById('loader');
        const overlay = document.getElementById('overlay');
        const infoBox = document.getElementById('infoBox');

        iframe.addEventListener('load', () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 300);
            }, 3000);
        });

        // Stäng rutan om man klickar utanför
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.style.opacity = '0';
                overlay.style.transition = 'opacity 0.3s ease';
                setTimeout(() => { overlay.style.display = 'none'; }, 300);
            }
        });

        function applyScale() {
            const vw = document.documentElement.clientWidth;
            if (vw >= DESKTOP_BREAKPOINT) {
                scaler.style.width = '1600px';
                scaler.style.height = '2366px';
                const scale = Math.min(1, vw / IFRAME_W);
                scaler.style.transform = `scale(${scale})`;
                wrapper.style.height = (IFRAME_H * scale) + 'px';
                wrapper.style.justifyContent = 'center';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.clipPath = 'inset(4px 34px 360px 3px)';
            } else {
                scaler.style.width = '100vw';
                scaler.style.height = 'calc(100vh + 140px)';
                scaler.style.transform = 'none';
                wrapper.style.height = 'calc(100vh + 140px)';
                wrapper.style.justifyContent = 'flex-start';
                iframe.style.width = '100vw';
                iframe.style.height = 'calc(100vh + 140px)';
                iframe.style.clipPath = 'inset(0px -40px 0px 0px)';
            }
        }
        applyScale();
        window.addEventListener('resize', applyScale);

        if ('ontouchstart' in window) {
            shield.style.display = 'none';
            iframe.style.pointerEvents = 'auto';
        } else {
            iframe.style.pointerEvents = 'none';
            shield.style.display = 'block';
            shield.addEventListener('click', (e) => {
                iframe.style.pointerEvents = 'auto';
                setTimeout(() => { iframe.style.pointerEvents = 'none'; }, 1000);
            });
        }

        window.addEventListener('wheel', (e) => {
            window.scrollBy({ top: e.deltaY, behavior: 'auto' });
        }, { passive: true });
    </script>
</body>
</html>
