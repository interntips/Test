<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-vm 2026 - Interntips</title> <style>
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            width: 100% !important; 
            height: 100% !important; 
            overflow: auto !important; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040 !important; /* Fixar den gråa bakgrunden på hela sidan */
        }
        .wrapper {
            width: 100% !important;
            height: 100vh !important;
            display: block !important;
            position: relative !important;
            background-color: #404040 !important; /* Fixar den gråa bakgrunden runt iFramen */
        }
        iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important;        /* DÖDAR standardramen */
            box-shadow: none !important;    /* DÖDAR skuggan helt */
            outline: none !important;       
            display: block !important;
            background-color: #404040 !important; 
        }
        
        /* Skölden som ligger över Excel och tvingar fram scroll-läge */
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body style="background-color: #404040 !important;"> <div class="wrapper" style="background-color: #404040 !important;">
        <div class="touch-shield" id="shield"></div>

        <iframe 
            id="excel-iframe"
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            frameborder="0" 
            scrolling="no"
            style="border:0 !important; box-shadow:none !important; background-color: #404040 !important;">
        </iframe>
    </div>

    <script>
        const shield = document.getElementById('shield');
        let moved = false;

        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                e.preventDefault();
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 10);
        }, { passive: false });

        shield.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);
    </script>

</body>
</html>
