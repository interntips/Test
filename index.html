<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        .wrapper {
            position: relative;
            background-color: #404040; 
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
        }
        
        .excel-container {
            display: block;
            margin: 0 auto;
            width: 1650px; 
            height: 1910px;    
            overflow: hidden !important; 
            position: relative;
            background-color: #404040; 

            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }
        
        iframe { 
            width: 1649px !important; 
            height: 1949px !important;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #FFFFFF;
            
            margin-top: -1px !important;
            margin-left: -1px !important;
            margin-bottom: -40px !important; 
            
            transform: scale(1.0006) translate3d(0, 0, 0); 
            transform-origin: top left; 
            will-change: transform;
            clip-path: inset(0px 0px 0px 0px);
        }
        
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
            touch-action: none;
        }

        @media (max-width: 1690px) {
            .excel-container {
                transform: scale(0.9);
                transform-origin: top center;
            }
        }
        @media (max-width: 1400px) {
            .excel-container {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }
        @media (max-width: 768px) {
            .wrapper {
                padding: 0;
            }
            .excel-container {
                transform: scale(0.45);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <!-- TA BORT MELLANSLAGEN I DENNA ADRESS NÄR DU HAR KLISTRAT IN DEN: -->
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&range=LIVE!C4%3ACA88&ActiveCell=C4&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const iframe = document.getElementById('excel-iframe');
        
        shield.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: e.deltaY,
                    deltaX: e.deltaX
                }, '*');
            }
        }, { passive: false });

        let startY = 0;
        let startX = 0;

        shield.addEventListener('touchstart', function(e) {
            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: true });

        shield.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const deltaY = startY - e.touches.pageY;
            const deltaX = startX - e.touches.pageX;

            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: deltaY,
                    deltaX: deltaX
                }, '*');
            }

            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: false });
    </script>

</body>
</html>
