<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040; /* Ändrat till din mörkgrå färg */
            user-select: none;
            -webkit-user-select: none;
        }
        
        .wrapper {
            position: relative;
            background-color: #404040; /* Ändrat till din mörkgrå färg */
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
        }
        
        /* BEHÅLLAREN FÖR EXCEL:
           Denna yta ligger direkt bakom iFramen och färgar Microsofts interna 
           pixelglapp mellan kolumn E/F och rad 10/11 med din valda färg. */
        .excel-container {
            display: block;
            margin: 0 auto;
            width: 1650px; 
            height: 1910px;    /* Döljer bottenraden */
            overflow: hidden !important; 
            position: relative;
            background-color: #404040; /* Ändrat till din mörkgrå färg */

            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }
        
        /* IFRAMEN GÖRS GENOMSKINLIG:
           Tvingar Microsofts interna glapp att släppa igenom färgkoden #404040. */
        iframe { 
            width: 1650px !important; 
            height: 1950px !important;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: transparent !important; 
            margin-bottom: -40px !important;
            
            /* Tvingar webbläsarens interna renderingsmotor att använda mörk bakgrund i skarvar */
            color-scheme: dark; 
        }
        
        /* GLASLAGER: Stoppar klick och cellmarkeringar helt */
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
            touch-action: none;
        }

        /* MOBIL- OCH SKÄRMJUSTERING */
        @media (max-width: 1690px) {
            .excel-container {
                transform: scale(0.9);
                transform-origin: top center;
            }
        }
        @media (max-width: 1400px) {
            .excel-container {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }
        @media (max-width: 768px) {
            .wrapper {
                padding: 0;
            }
            .excel-container {
                transform: scale(0.45);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <!-- Din fullständiga, omodifierade adress med transparens aktiverad -->
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms" 
                allowtransparency="true"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const iframe = document.getElementById('excel-iframe');
        
        // Vidarebefordrar skroll-händelser stabilt in i Excel
        shield.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: e.deltaY,
                    deltaX: e.deltaX
                }, '*');
            }
        }, { passive: false });

        // Touch-skroll för surfplattor och mobiler
        let startY = 0;
        let startX = 0;

        shield.addEventListener('touchstart', function(e) {
            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: true });

        shield.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const deltaY = startY - e.touches.pageY;
            const deltaX = startX - e.touches.pageX;

            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: deltaY,
                    deltaX: deltaX
                }, '*');
            }

            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: false });
    </script>

</body>
</html>
