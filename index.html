<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        .wrapper {
            position: relative;
            background-color: #404040; 
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
        }
        
        /* BEHÅLLAREN: Styr den exakta ramen för ditt Excelark */
        .excel-container {
            display: block;
            margin: 0 auto;
            width: 1650px; 
            height: 1910px;    /* Klipper bort menyraden i botten */
            overflow: hidden !important; 
            position: relative;
            background-color: #404040; 

            /* Tvingar webbläsaren att rendera skarpa linjer */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }
        
        /* FIXEN FÖR INTERNA GLAPPET: 
           Genom att sätta width till 100% istället för fasta pixlar, tillåter vi 
           Excels interna kod att själv synka panelerna utan att skapa pixelavrundningsfel. 
           Vi höjer iframen något för att dölja bottenraden naturligt. */
        iframe { 
            width: 100% !important; 
            height: 1950px !important;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #FFFFFF;
            margin-bottom: -40px !important; /* Skjuter ner bottenraden utanför behållaren */
        }
        
        /* GLASLAGER: Ligger klistrat över för att stoppa klick och cellmarkeringar */
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
            touch-action: none;
        }

        /* MOBIL- OCH SKÄRMJUSTERING */
        @media (max-width: 1690px) {
            .excel-container {
                transform: scale(0.9);
                transform-origin: top center;
            }
        }
        @media (max-width: 1400px) {
            .excel-container {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }
        @media (max-width: 768px) {
            .wrapper {
                padding: 0;
            }
            .excel-container {
                transform: scale(0.45);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <!-- Din fullständiga, omodifierade adress i en optimerad iframe -->
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdHideSheetTabs=True&nav=1" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const iframe = document.getElementById('excel-iframe');
        
        // Vidarebefordrar skroll-händelser stabilt in i Excel
        shield.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: e.deltaY,
                    deltaX: e.deltaX
                }, '*');
            }
        }, { passive: false });

        // Touch-skroll för surfplattor och mobiler
        let startY = 0;
        let startX = 0;

        shield.addEventListener('touchstart', function(e) {
            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: true });

        shield.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const deltaY = startY - e.touches.pageY;
            const deltaX = startX - e.touches.pageX;

            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: deltaY,
                    deltaX: deltaX
                }, '*');
            }

            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: false });
    </script>

</body>
</html>
