<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-VM 2026 - Interntips</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #404040;
        }
        .wrapper {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            position: relative;
            background-color: #404040;
        }
        .iframe-scaler {
            transform-origin: top left;
            position: relative;
            flex-shrink: 0;
        }
        iframe {
            border: none;
            display: block;
        }
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrapper" id="wrapper">
        <div class="iframe-scaler" id="scaler">
            <div class="touch-shield" id="shield"></div>
            <iframe
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!B3%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>
    <script>
        const IFRAME_W = 1600;
        const IFRAME_H = 1806;
        const DESKTOP_BREAKPOINT = 1280;
        const MOBILE_BASE_W = 393; // Pixel 8 bredd som referens
        const MOBILE_IFRAME_W = 1600;
        const MOBILE_IFRAME_H = 1806;

        const scaler  = document.getElementById('scaler');
        const wrapper = document.getElementById('wrapper');
        const shield  = document.getElementById('shield');
        const iframe  = document.getElementById('excel-iframe');

        function applyScale() {
            const vw = document.documentElement.clientWidth;
            if (vw >= DESKTOP_BREAKPOINT) {
                // Dator
                scaler.style.width = '1600px';
                scaler.style.height = '1806px';
                scaler.style.transformOrigin = 'top center';
                iframe.style.width = '1600px';
                iframe.style.height = '1806px';
                const scale = Math.min(1, vw / IFRAME_W);
                scaler.style.transform = `scale(${scale})`;
                wrapper.style.height = (IFRAME_H * scale) + 'px';
                wrapper.style.justifyContent = 'center';
                iframe.style.clipPath = 'inset(4px 39px 120px 3px)';
            } else {
                // Mobil: skala så att alla mobiler ser ut som Pixel 8
                const scale = vw / MOBILE_BASE_W;
                scaler.style.transformOrigin = 'top left';
                scaler.style.width = MOBILE_IFRAME_W + 'px';
                scaler.style.height = MOBILE_IFRAME_H + 'px';
                scaler.style.transform = `scale(${scale})`;
                iframe.style.width = MOBILE_IFRAME_W + 'px';
                iframe.style.height = MOBILE_IFRAME_H + 'px';
                wrapper.style.height = (MOBILE_IFRAME_H * scale) + 'px';
                wrapper.style.justifyContent = 'flex-start';
                iframe.style.clipPath = 'none';
            }
        }
        applyScale();
        window.addEventListener('resize', applyScale);

        if ('ontouchstart' in window) {
            shield.style.display = 'none';
            iframe.style.pointerEvents = 'auto';
        } else {
            iframe.style.pointerEvents = 'none';
            shield.style.display = 'block';
            shield.addEventListener('click', (e) => {
                iframe.style.pointerEvents = 'auto';
                setTimeout(() => { iframe.style.pointerEvents = 'none'; }, 1000);
            });
        }

        window.addEventListener('wheel', (e) => {
            window.scrollBy({ top: e.deltaY, behavior: 'auto' });
        }, { passive: true });
    </script>
</body>
</html>
