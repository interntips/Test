<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-VM 2026 - Interntips</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            background-color: #404040;
        }

        .wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            background-color: #404040;
        }

        .iframe-scaler {
            width: 1600px;
            height: 1806px;
            transform-origin: top center;
            position: relative;
            flex-shrink: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            clip-path: inset(3px 3px 80px 2px);
            pointer-events: none;
        }

        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="wrapper" id="wrapper">
        <div class="iframe-scaler" id="scaler">
            <div class="touch-shield" id="shield"></div>
            <iframe
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C3%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const IFRAME_W = 1600;
        const IFRAME_H = 1806;

        const scaler  = document.getElementById('scaler');
        const wrapper = document.getElementById('wrapper');
        const shield  = document.getElementById('shield');
        const iframe  = document.getElementById('excel-iframe');

        function applyScale() {
            const vw = document.documentElement.clientWidth;
            const scale = Math.min(1, vw / IFRAME_W);
            scaler.style.transform = `scale(${scale})`;
            wrapper.style.height = (IFRAME_H * scale) + 'px';
        }

        applyScale();
        window.addEventListener('resize', applyScale);

        if ('ontouchstart' in window) {
            // Touch: shield hanterar scroll, klick passerar igenom
            let moved = false;
            shield.addEventListener('touchstart', () => { moved = false; }, { passive: true });
            shield.addEventListener('touchmove', () => {
                moved = true;
            }, { passive: true });
            shield.addEventListener('touchend', (e) => {
                if (!moved) {
                    // Klick – skicka till iframen
                    iframe.style.pointerEvents = 'auto';
                    setTimeout(() => { iframe.style.pointerEvents = 'none'; }, 500);
                }
            }, { passive: false });

        } else {
            // Dator: shield fångar scroll hela tiden
            // Vid klick: aktivera iframen tillfälligt
            shield.addEventListener('click', (e) => {
                iframe.style.pointerEvents = 'auto';
                // Simulera klick på iframen
                const rect = iframe.getBoundingClientRect();
                setTimeout(() => { iframe.style.pointerEvents = 'none'; }, 1000);
            });
        }

        // Global scroll – fungerar alltid eftersom iframen aldrig får fokus
        window.addEventListener('wheel', (e) => {
            window.scrollBy({ top: e.deltaY, behavior: 'auto' });
        }, { passive: true });
    </script>
</body>
</html>
