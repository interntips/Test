            background-color: #404040;

        .wrapper {
            width: 100%;

            justify-content: center;
            position: relative;
            background-color: #404040;
        }

        .iframe-scaler {
            width: 1600px;
            height: 1806px;
            transform-origin: top center;
            position: relative;
            flex-shrink: 0;
            margin: 0;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            clip-path: inset(3px 3px 40px 3px);
        }

        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            display: none;
        }
    </style>
