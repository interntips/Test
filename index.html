<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040 !important; /* Tvingar bakgrunden att bli mörkgrå */
        }
        .wrapper {
            width: 100%;
            height: 100vh;
            display: block;
            position: relative;
            background-color: #404040 !important; /* Tvingar bakgrunden att bli mörkgrå */
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none !important;        /* Tar bort standardramen */
            box-shadow: none !important;    /* Tar bort eventuella CSS-skuggor */
            outline: none !important;       /* Tar bort fokuseringslinjer */
            display: block;
            background-color: #404040 !important; /* Ger iFramen samma bakgrund */
        }
        
        /* Skölden som ligger över Excel och tvingar fram scroll-läge */
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="touch-shield" id="shield"></div>

        <iframe 
            id="excel-iframe"
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>

    <script>
        const shield = document.getElementById('shield');
        let moved = false;

        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                e.preventDefault();
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 10);
        }, { passive: false });

        shield.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);
    </script>

</body>
</html>
