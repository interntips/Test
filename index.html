<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #FFFFFF; 
            /* Hindrar användaren från att markera text runt bladet */
            user-select: none;
            -webkit-user-select: none;
        }
        
        .wrapper {
            position: relative;
            background-color: #FFFFFF; 
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
        }
        
        /* DATOR-INSTÄLLNINGAR FÖR BEHÅLLAREN: 
           Använder margin: 0 auto för att centrera på jämna pixlar.
           Tvingar grafikmotorn att rita skarpa kanter för att motverka vita linjer. */
        .excel-container {
            display: block;
            margin: 0 auto;
            width: 1650px; 
            max-width: 100%; 
            height: 1910px;    /* Klipper bort de nedersta 40 pixlarna så menyraden försvinner */
            overflow: hidden !important; 
            position: relative;
            
            /* Motverkar pixelavrundningsfel i Chrome/Safari/Edge */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
        }
        
        /* iFramen görs lite högre än sin behållare så att bottenraden hamnar "utanför bild" */
        iframe { 
            width: 100%; 
            height: 1950px;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #FFFFFF;
            margin-bottom: -40px !important; /* Trycker ner bottenraden under kanten */
        }
        
        /* GLASLAGER: Ligger permanent i vägen så man aldrig kan klicka eller markera celler i Excel */
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
            touch-action: none; /* Stoppar standard-touch så vi kan styra det via script */
        }

        /* MOBIL-JUSTERING */
        @media (max-width: 768px) {
            .wrapper {
                height: 100vh;
                padding: 0;
                overflow: hidden;
            }
            .excel-container {
                width: 100%;
                max-width: 100%;
                height: 100%;
                margin: 0;
            }
            iframe {
                height: 100%; 
                overflow: auto !important; 
                margin-bottom: 0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <!-- HÄR ÄR DIN FULLSTÄNDIGA ADRESS UTAN FÖRKORTNINGAR -->
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA88&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const iframe = document.getElementById('excel-iframe');
        
        // Fångar upp mushjulet på skölden och skickar vidare scroll-infot direkt in i Excels olåsta celler
        shield.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (iframe.contentWindow) {
                // Skickar scroll-händelsen förbi det blockerande lagret direkt till Excels fönster
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: e.deltaY,
                    deltaX: e.deltaX
                }, '*');
            }
        }, { passive: false });

        // Hantering av touch-scroll för mobiler (swipes) utan att tillåta klick/markeringar
        let startY = 0;
        let startX = 0;

        shield.addEventListener('touchstart', function(e) {
            startY = e.touches[0].pageY;
            startX = e.touches[0].pageX;
        }, { passive: true });

        shield.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const deltaY = startY - e.touches[0].pageY;
            const deltaX = startX - e.touches[0].pageX;

            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: deltaY,
                    deltaX: deltaX
                }, '*');
            }

            startY = e.touches[0].pageY;
            startX = e.touches[0].pageX;
        }, { passive: false });
    </script>

</body>
</html>
