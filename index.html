<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        /* Tillåter hela webbsidan att scrolla naturligt */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040; 
        }
        
        /* Centrerar Excel-blocket */
        .wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            position: relative;
            background-color: #404040; 
            padding: 20px;
            box-sizing: border-box;
        }
        
        /* DATOR & MOBIL-INSTÄLLNINGAR FÖR IFRAME */
     iframe { 
            width: 100%; 
            max-width: 1650px; /* <--- ÄNDRAT FRÅN 1450px TILL 1650px */
            height: 1950px;    
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #404040;
            overflow: hidden !important; 
        }
        
        /* Den globala osynliga skölden som tar hand om scrollen över hela skärmen */
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            /* Denna rad gör att musen ignorerar skölden vid KLICK, men JavaScript fångar upp SCROLL */
            pointer-events: auto; 
        }

        /* MOBIL-JUSTERING */
        @media (max-width: 768px) {
            .wrapper {
                height: 100vh;
                padding: 0;
                align-items: center;
                overflow: hidden;
            }
            iframe {
                max-width: 100%;
                height: 100%; 
                overflow: auto !important; 
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="scroll-shield" id="shield"></div>

        <iframe 
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>

    <script>
        const shield = document.getElementById('shield');
        
        // DATOR-SCROLL: Fångar upp scrollhjulet över iFramen och flyttar huvudsidan istället
        shield.addEventListener('wheel', function(e) {
            window.scrollBy({
                top: e.deltaY,
                left: e.deltaX,
                behavior: 'auto' // Gör scrollen direkt och responsiv
            });
        }, { passive: true });

        // MOBIL-TOUCH: Hanterar svepningar på mobilen
        let moved = false;
        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                // Om det bara var ett snabbt tryck (klick), tillåt det genom skölden
                shield.style.pointerEvents = 'none';
                
                // Skicka ett fejk-klick på exakt samma position så Excel reagerar
                const clickEvent = new MouseEvent('click', {
                    clientX: e.changedTouches[0].clientX,
                    clientY: e.changedTouches[0].clientY,
                    bubbles: true
                });
                document.elementFromPoint(e.changedTouches[0].clientX, e.changedTouches[0].clientY).dispatchEvent(clickEvent);
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 50);
        }, { passive: false });
    </script>

</body>
</html>
