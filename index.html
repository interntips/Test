<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fotbolls-vm 2026 - Interntips</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040 !important; 
        }
        
        .wrapper {
            width: 100%;
            height: 100vh;
            display: block;
            position: relative;
            background-color: #404040 !important; 
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            background-color: #404040 !important;
        }
        
        /* Skölden som ligger över Excel och tvingar fram scroll-läge */
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
        }

        /* ------------------------------------------
           DATOR-INSTÄLLNINGAR (Skärmar över 768px)
           Anpassat för smala 20-bildpunkters kolumner
           ------------------------------------------ */
        @media (min-width: 769px) {
            .wrapper {
                width: 680px !important;       /* Perfekt bredd för din kompakta tabell */
                height: 1650px !important;     /* Höjd som klipper bort dolda vita celler i botten */
                margin: 30px auto !important;  /* Centrerar hela paketet på datorskärmen */
                overflow: hidden !important;   /* Klipper bort Excels scrollister och vita ytor */
                box-shadow: none !important;
            }
            
            iframe {
                width: 730px !important;       /* Trycker ut Excels scrollista 50px till höger om wrapper */
                height: 1750px !important;     /* Trycker ner botten utom synhåll */
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="touch-shield" id="shield"></div>

        <iframe 
            id="excel-iframe"
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
            frameborder="0"
            scrolling="no">
        </iframe>
    </div>

    <script>
        const shield = document.getElementById('shield');
        let moved = false;

        shield.addEventListener('touchstart', function() {
            moved = false;
        }, { passive: true });

        shield.addEventListener('touchmove', function() {
            moved = true;
            shield.style.pointerEvents = 'none'; 
        }, { passive: true });

        shield.addEventListener('touchend', function(e) {
            if (!moved) {
                e.preventDefault();
            }
            
            setTimeout(() => {
                shield.style.pointerEvents = 'auto';
            }, 10);
        }, { passive: false });

        shield.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
        }, true);
    </script>

</body>
</html>
