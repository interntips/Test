<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow-x: auto; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #FFFFFF; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        .wrapper {
            position: relative;
            background-color: #FFFFFF; 
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            min-height: 100vh;
        }
        
        /* BEHÅLLAREN FUNGERAR NU SOM EN STRIPT MASK:
           Den har exakta mått, och allt som tvingas utanför dess ramar döljs direkt. */
        .excel-container {
            display: block;
            margin: 0 auto;
            width: 1650px; 
            height: 1910px; /* Den exakta höjden du vill visa på skärmen */
            overflow: hidden !important; 
            position: relative;
            background-color: #FFFFFF;
        }
        
        /* TRICKET SOM TAR BORT FELET:
           Genom att lägga till margin-top och margin-left drar vi ut Excels interna 
           felmarginaler utanför behållarens synliga yta, vilket klipper bort de vita linjerna. */
        iframe { 
            width: 1658px !important;  /* Gjort 8px bredare för att kompensera för sidoklippet */
            height: 1958px !important; /* Gjort 8px högre för att kompensera för toppklippet */   
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #FFFFFF;
            
            /* Drar ut Microsofts fasta vita linje under kanten på behållaren */
            margin-top: -4px !important;  
            margin-left: -4px !important; 
            margin-bottom: -44px !important; /* Behåller döljningen av menyraden i botten */
            
            /* Tvingar webbläsaren att frysa renderingen i ett skarpt läge */
            transform: translate3d(0, 0, 0);
        }
        
        /* GLASLAGER: Stoppar klick och cellmarkeringar helt */
        .scroll-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            pointer-events: auto; 
            touch-action: none;
        }

        /* MOBIL- OCH SKÄRMJUSTERING */
        @media (max-width: 1690px) {
            .excel-container {
                transform: scale(0.9);
                transform-origin: top center;
            }
        }
        @media (max-width: 1400px) {
            .excel-container {
                transform: scale(0.75);
                transform-origin: top center;
            }
        }
        @media (max-width: 768px) {
            .wrapper {
                padding: 0;
            }
            .excel-container {
                transform: scale(0.45);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="excel-container">
            <div class="scroll-shield" id="shield"></div>

            <!-- Din fullständiga, omodifierade adress -->
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms" 
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
            </iframe>
        </div>
    </div>

    <script>
        const shield = document.getElementById('shield');
        const iframe = document.getElementById('excel-iframe');
        
        // Vidarebefordrar skroll-händelser stabilt in i Excel
        shield.addEventListener('wheel', function(e) {
            e.preventDefault();
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: e.deltaY,
                    deltaX: e.deltaX
                }, '*');
            }
        }, { passive: false });

        // Touch-skroll för surfplattor och mobiler
        let startY = 0;
        let startX = 0;

        shield.addEventListener('touchstart', function(e) {
            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: true });

        shield.addEventListener('touchmove', function(e) {
            e.preventDefault();
            const deltaY = startY - e.touches.pageY;
            const deltaX = startX - e.touches.pageX;

            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({
                    type: 'scroll',
                    deltaY: deltaY,
                    deltaX: deltaX
                }, '*');
            }

            startY = e.touches.pageY;
            startX = e.touches.pageX;
        }, { passive: false });
    </script>

</body>
</html>
