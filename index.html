<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Webbvy</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            -webkit-overflow-scrolling: touch;
            background-color: #404040; 
        }
        
        /* Centrerar innehållet på datorskärmar och tillåter sidan att scrolla nedåt vid behov */
        .wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Startar från toppen så man kan scrolla ner på datorn */
            position: relative;
            background-color: #404040; 
            padding-top: 20px;
            padding-bottom: 20px;
            box-sizing: border-box;
        }
        
        /* DATOR-INSTÄLLNINGAR: Ger iFramen en rejäl höjd och bredd så rad 51+ inte klipps bort */
        iframe { 
            width: 100%; 
            max-width: 1250px; 
            height: 1750px; /* <--- tvingar fram höjden så att alla rader laddas in */
            border: 0 !important;      
            outline: none !important;
            display: block;
            background-color: #404040;
        }
        
        /* Skölden aktiveras ENBART på mobiler */
        .touch-shield {
            display: none;
        }

        /* MOBIL-INSTÄLLNINGAR (Skärmar under 768px) */
        @media (max-width: 768px) {
            .wrapper {
                height: 100vh;
                padding: 0;
                align-items: center;
            }
            .touch-shield {
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
                background: transparent;
            }
            iframe {
                max-width: 100%;
                height: 100%; /* På mobilen behåller vi fullskärm för touch-zoomens skull */
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="touch-shield" id="shield"></div>

        <iframe 
            src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&nav=1" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups">
        </iframe>
    </div>

    <script>
        const shield = document.getElementById('shield');
        let moved = false;

        if (shield) {
            shield.addEventListener('touchstart', function() {
                moved = false;
            }, { passive: true });

            shield.addEventListener('touchmove', function() {
                moved = true;
                shield.style.pointerEvents = 'none'; 
            }, { passive: true });

            shield.addEventListener('touchend', function(e) {
                if (!moved) {
                    e.preventDefault();
                }
                
                setTimeout(() => {
                    shield.style.pointerEvents = 'auto';
                }, 10);
            }, { passive: false });
        }
    </script>

</body>
</html>
