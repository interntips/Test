            clip-path: inset(4px 39px 120px 3px);
        }
        .touch-shield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: transparent;
            display: none;
        }
        .loader-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: #00b0f0;
            z-index: 100;
            transition: opacity 0.3s ease;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border-left-color: #00b0f0;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: transparent;
            z-index: 200;
        }
        .info-box {
            background-color: #404040;
            border: 1px solid #00b0f0;
            color: #ffc000;
            font-family: sans-serif;
            font-size: 16px;
            line-height: 1.6;
            padding: 32px 24px 24px;
            width: 60%;
            border-radius: 4px;
            text-align: center;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 201;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
        }
        .close-btn {

            background-color: transparent;
            border: 1px solid #00b0f0;
            color: #00b0f0;
            font-family: sans-serif;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .close-btn:hover {
            background-color: #00b0f0;
            color: #404040;
        }
    </style>
</head>
