<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fotbolls-VM 2026 - Interntips</title>
    <style>
        /* Tvingar hela sidan att ha din ljusgråa färg */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: auto !important; 
            background-color: #404040 !important; 
        }

        /* Den yttre behållaren som centrerar allt på datorn */
        #viewport {
            width: 100% !important;
            min-height: 100vh !important;
            position: relative !important;
            background-color: #404040 !important;
            display: flex !important;
            justify-content: center !important; 
            align-items: flex-start !important;
        }

        /* Den inre behållaren runt Excel-arket */
        #zoom-layer {
            transform-origin: 0 0;
            background-color: #404040 !important;
            box-sizing: border-box;
        }

        /* DATOR-INSTÄLLNINGAR (Skärmar över 768px) */
        @media (min-width: 769px) {
            #zoom-layer {
                width: 1150px !important;      /* Ökad från 620px eftersom ditt nya blad är mycket bredare */
                height: 1750px !important;     /* Justerad höjd för att klippa bort det vita i botten */
                margin-top: 30px !important;   
                margin-bottom: 30px !important;
                overflow: hidden !important;   /* Klipper bort excels interna vita yta */
                box-shadow: none !important;   /* SKUGGAN ÄR BORTTAGEN HÄR */
            }
        }

        /* MOBIL-INSTÄLLNINGAR (Skärmar under 768px) */
        @media (max-width: 768px) {
            html, body { overflow: hidden !important; }
            #viewport { display: block !important; }
            #zoom-layer {
                width: 1150px !important;      /* Matchar bredden så att mobilen kan zooma ut rätt */
                height: 1750px !important; 
                overflow: hidden !important;
                margin: 0 !important;
            }
        }

        /* iFramen blir 40px högre och trycks ner för att dölja menyraden */
        iframe {
            width: 100% !important;
            height: calc(100% + 40px) !important; 
            margin-bottom: -40px !important;      
            border: none !important;
            display: block !important;
            opacity: 0; 
            transition: opacity 0.3s ease-in;
        }

        @media (max-width: 768px) {
            iframe { 
                pointer-events: none !important;
            }
            #touch-handler {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 10;
            }
        }

        /* LADDNINGSSNURRA */
        .loader-container {
            position: absolute;
            top: 300px; 
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
            color: #688fa0; 
            z-index: 5;
            transition: opacity 0.3s ease;
        }

        @media (max-width: 768px) {
            .loader-container {
                top: 50vh;
            }
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border-left-color: #688fa0; 
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <div>Laddar VM-tipset...</div>
        </div>

        <div id="zoom-layer">
            <div id="touch-handler"></div>
            <iframe 
                id="excel-iframe"
                src="https://1drv.ms/x/c/e8830cf447bdf3d5/IQRCu4LbUSNUT6SOXII_dut2AeY16NyzBwAVM06qUXYjOrc?em=2&wdAllowInteractivity=True&Item='LIVE'!C4%3ACA97&wdHideGridlines=True&nav=1&wdHideHeaders=True&action=embedview"
                sandbox="allow-scripts allow-same-origin allow-forms"
                onload="iframeLoaded()">
            </iframe>
        </div>
    </div>

    <script>
        function iframeLoaded() {
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('excel-iframe').style.opacity = '1';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 300);
        }

        const zoomLayer = document.getElementById('zoom-layer');
        const targetWidth = 1150; /* Ändrad till 1150 för att matcha den nya bredden */
        
        let scale = 1;
        let startDist = 0;
        let posX = 0;
        let posY = 0;
        let startX = 0;
        let startY = 0;
        let isPanning = false;

        function adjustZoom() {
            if (window.innerWidth <= 768) {
                scale = window.innerWidth / targetWidth;
                posX = 0;
                posY = 0;
                updateTransform();
                return scale;
            }
            zoomLayer.style.transform = 'none';
            return 1;
        }

        function updateTransform() {
            zoomLayer.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
        }

        window.addEventListener('resize', () => { adjustZoom(); });

        document.addEventListener('touchstart', (e) => {
            if (window.innerWidth > 768) return;

            if (e.touches.length === 1) {
                isPanning = true;
                startX = e.touches[0].pageX - posX;
                startY = e.touches[0].pageY - posY;
            } else if (e.touches.length === 2) {
                isPanning = false;
                startDist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        });

        document.addEventListener('touchmove', (e) => {
            if (window.innerWidth > 768) return;
            e.preventDefault(); 

            if (isPanning && e.touches.length === 1) {
                posX = e.touches[0].pageX - startX;
                posY = e.touches[0].pageY - startY;
                
                const minPanX = window.innerWidth - (targetWidth * scale);
                if (minPanX < 0) {
                    posX = Math.min(100, Math.max(minPanX - 100, posX)); 
                } else {
                    posX = 0; 
                }
                
                const minPanY = window.innerHeight - (1750 * scale);
                posY = Math.min(0, Math.max(minPanY, posY));

                updateTransform();
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );

                if (startDist !== 0) {
                    const delta = dist / startDist;
                    const oldScale = scale;
                    scale = Math.min(Math.max(window.innerWidth / targetWidth, scale * delta), 2.5); 
                    
                    posX = posX * (scale / oldScale);
                    posY = posY * (scale / oldScale);
                    
                    updateTransform();
                    startDist = dist;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', () => {
            startDist = 0;
            isPanning = false;
        });

        adjustZoom();
    </script>
</body>
</html>
